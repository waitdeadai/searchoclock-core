name: tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: python3 --version
      - name: Syntax
        run: bash -n ./socx && bash -n ./socx-run
      - name: selftest
        run: bash ./socx selftest
      - name: hook — failure fires the protocol
        run: |
          out=$(printf '%s' '{"hook_event_name":"command.failed","tool_name":"shell","command":"npm run build","exit_code":1,"stderr":"Error: Cannot find module vite"}' \
            | SEARCHOCLOCK_STATE_DIR="$RUNNER_TEMP/h" bash ./socx hook)
          echo "$out" | grep -q "SEARCH O'CLOCK" || { echo "FAIL: no protocol"; exit 1; }
          echo "$out" | grep -q '{{' && { echo "FAIL: placeholder leak"; exit 1; } || true
      - name: hook — success is silent
        run: |
          out=$(printf '%s' '{"hook_event_name":"command.success","tool_name":"shell","command":"git pull","exit_code":0,"stdout":"Already up to date."}' \
            | SEARCHOCLOCK_STATE_DIR="$RUNNER_TEMP/s" bash ./socx hook)
          [ -z "$out" ] || { echo "FAIL: fired on success"; exit 1; }
      - name: run — wraps failure, preserves exit code, emits protocol
        run: |
          set +e
          out=$(SEARCHOCLOCK_STATE_DIR="$RUNNER_TEMP/r" bash ./socx run -- bash -c 'echo "boom: build failed" >&2; exit 7' 2>/dev/null)
          rc=$?
          set -e
          [ "$rc" -eq 7 ] || { echo "FAIL: exit code not preserved ($rc)"; exit 1; }
          echo "$out" | grep -q "SEARCH O'CLOCK" || { echo "FAIL: no protocol in run mode"; exit 1; }
      - name: run — success passes through with no protocol
        run: |
          set +e
          out=$(SEARCHOCLOCK_STATE_DIR="$RUNNER_TEMP/r2" bash ./socx run -- bash -c 'echo hi; exit 0' 2>/dev/null)
          rc=$?
          set -e
          [ "$rc" -eq 0 ] || { echo "FAIL: exit ($rc)"; exit 1; }
          echo "$out" | grep -q "SEARCH O'CLOCK" && { echo "FAIL: fired on success"; exit 1; } || true
